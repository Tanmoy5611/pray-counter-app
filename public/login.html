<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pray Counter – Login</title>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Login Styles -->
  <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-body dark">

<div class="animated-bg"></div>

<main class="login-container">

  <!-- HEADER -->
  <div class="login-header">
    <i class="bi bi-heart-pulse brand-icon"></i>
    <h2>Welcome to Pray Counter</h2>
    <p class="subtitle">Login to count your Prayers</p>
  </div>

  <!-- FORM -->
  <form id="loginForm">

    <!-- EMAIL -->
    <div class="input-group">
      <div class="input-wrapper">
        <i class="bi bi-envelope leading-icon"></i>
        <input
                type="email"
                id="email"
                required
                placeholder=" "
                autocomplete="email"
        >
        <label>Email Address </label>
      </div>
    </div>

    <!-- PASSWORD -->
    <div class="input-group">
      <div class="input-wrapper">
        <i class="bi bi-shield-lock leading-icon"></i>
        <input
                type="password"
                id="password"
                required
                placeholder=" "
                autocomplete="current-password"
        >
        <label>Password </label>
        <i id="togglePassword" class="bi bi-eye toggle-eye"></i>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="login-actions">
      <button type="submit" class="primary-btn">
        <i class="bi bi-box-arrow-in-right"></i>
        Login
      </button>

      <div class="secondary-actions">
        <button type="button" id="signupBtn" class="icon-btn-adv" title="Sign up">
          <i class="bi bi-person-plus"></i>
        </button>

        <button type="button" id="forgotPasswordBtn" class="icon-btn-adv" title="Reset password">
          <i class="bi bi-key"></i>
        </button>

        <button type="button" id="themeToggle" class="icon-btn-adv" title="Toggle theme">
          <i id="themeIcon" class="bi bi-moon-stars"></i>
        </button>
      </div>
    </div>

  </form>

</main>



<footer class="login-footer">
  <p>“Each tap is a step closer to the Divine. Keep praying.”</p>
  <small>&copy; 2025 Tanmoy Das. All rights reserved.</small>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="js/firebase/firebase-init.js"></script>
<script src="js/auth/login.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
