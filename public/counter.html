<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Nam Jaap Mode</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>

  <style>
    /* Mobile first reset */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Inter", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body.light {
      background: #ffffff;
    }

    body.dark {
      background: #000;
    }

    /* Header */
    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-sizing: border-box;
      z-index: 10;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .glow-title {
      margin: 0;
      font-size: 1.55rem;
      font-weight: 750;
      letter-spacing: 0.2px;
      color: rgba(210, 210, 210, 0.92);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.95), 0 10px 26px rgba(0, 0, 0, 0.75);
    }

    /* Nav icons */
    .nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav button, .night-btn {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .nav button:active, .night-btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.16);
    }

    /* Full Touch Area & Centered Content */
    #jaapContainer {
      position: fixed;
      top: 92px;
      left: 0;
      width: 100%;
      height: calc(100% - 92px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Loop & Total STYLING */
    #loopText {
      font-size: 1.1rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    /* Loop change animation */
    .loop-animate {
      animation: loopChange 0.6s ease-out forwards;
    }

    @keyframes loopChange {
      0% {
        opacity: 0.4;
        transform: translateY(4px);
        letter-spacing: 0.12em;
      }
      60% {
        opacity: 1;
        transform: translateY(-2px);
        letter-spacing: 0.08em;
      }
      100% {
        opacity: 0.55;
        transform: translateY(0);
        letter-spacing: 0.08em;
      }
    }

    #totalText {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 30px;
    }

    /* Counter normal mode */
    #beadNumber {
      font-size: clamp(4.2rem, 22vw, 7rem);
      font-weight: 800;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.32);
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      transition: transform 0.12s ease-out, color 0.12s ease-out, text-shadow 0.12s ease-out;
      text-shadow: 0 10px 40px rgba(0, 0, 0, 0.85);
    }

    #beadTotal i {
      margin-left: 6px;
      font-size: 0.85em;
      opacity: 0.55;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.5);
    }

    #beadTotal {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.25);
      margin-top: 10px;
    }

    #hintText {
      position: absolute;
      bottom: 40px;
      text-align: center;
      color: rgba(255, 255, 255, 0.2);
    }

    /* normal pulse */
    .pulse-text {
      animation: normalPulse 0.5s ease-out forwards;
    }

    @keyframes normalPulse {
      0% { opacity: 1; transform: scale(1); color: rgba(255, 255, 255, 0.71); }
      100% { opacity: 0.32; transform: scale(1.08); color: rgba(255, 255, 255, 0.32); }
    }

    /* Ultra dim night mode */
    #nightToggle:checked ~ .app-header {
      background: rgba(0, 0, 0, 0.35);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    #nightToggle:checked ~ .app-header .glow-title { color: rgba(200, 200, 200, 0.35); }

    /* Night Mode Hover for Nav Buttons */
    #nightToggle:checked ~ .app-header .nav button:hover,
    #nightToggle:checked ~ .app-header .nav .night-btn:hover {
      background: rgba(140, 120, 255, 0.18);
      color: rgba(200, 180, 255, 0.95);
      border-color: rgba(140, 120, 255, 0.35);
      box-shadow: 0 0 12px rgba(140, 120, 255, 0.25);
    }

    /* Stronger click effect in night mode */
    #nightToggle:checked ~ .app-header .nav button:active,
    #nightToggle:checked ~ .app-header .nav .night-btn:active {
      transform: scale(0.92);
      background: rgba(140, 120, 255, 0.28);
    }

    /* Target the new beadNumber and Container for Night Mode */
    #nightToggle:checked ~ #jaapContainer #beadNumber {
      color: rgba(255, 255, 255, 0.14);
      text-shadow: 0 12px 40px rgba(0, 0, 0, 1);
    }

    #nightToggle:checked ~ #jaapContainer .pulse-text {
      animation: nightPulse 0.6s ease-out forwards;
    }

    @keyframes nightPulse {
      0% { opacity: 1; transform: scale(1); color: rgba(255, 255, 255, 0.65); }
      100% { opacity: 0.14; transform: scale(1.05); color: rgba(255, 255, 255, 0.14); }
    }

    /* Small mobile polish */
    @media (max-width: 420px) {
      .app-header { height: 88px; }
      #jaapContainer { top: 88px; height: calc(100% - 88px); }
      .glow-title { font-size: 1.45rem; }
    }

    /* Light mode overrides */

    body.light .glow-title {
      color: rgba(0,0,0,0.85);
      text-shadow: none;
    }

    body.light #loopText {
      color: rgba(0,0,0,0.6);
    }

    body.light #totalText {
      color: rgba(0,0,0,0.4);
    }

    body.light #beadNumber {
      color: rgba(0,0,0,0.35);
      text-shadow: none;
    }

    body.light #beadTotal {
      color: rgba(0,0,0,0.4);
    }

    body.light #hintText {
      color: rgba(0,0,0,0.4);
    }

    body.light .nav button,
    body.light .night-btn {
      background: rgba(0,0,0,0.05);
      color: rgba(0,0,0,0.75);
      border-color: rgba(0,0,0,0.1);
    }

    body.light #beadNumber {
      color: rgba(0, 0, 0, 0.5);
    }

    /* FORCE beadNumber visible in LIGHT mode */
    body.light #beadNumber{
      display: block !important;
      opacity: 1 !important;
      visibility: visible !important;
      color: rgba(0,0,0,0.55) !important;
      text-shadow: none !important;
      z-index: 2 !important;
      position: relative !important;
    }

  </style>
</head>

<body class="dark">

<input type="checkbox" id="nightToggle" hidden/>

<header class="app-header">
  <h2 class="glow-title">Counter</h2>
  <div class="nav">
    <button onclick="location.href='index.html'"><i class="bi bi-house-heart-fill"></i></button>
    <button onclick="goToSettings()"><i class="bi bi-gear"></i></button>
    <label for="nightToggle" class="night-btn"><i class="bi bi-moon-stars-fill"></i></label>
  </div>
</header>

<main id="jaapContainer">
  <div id="loopText">LOOP 0</div>
  <div id="totalText">Total 0</div>

  <div id="beadNumber">0</div>
  <div id="beadTotal">/ 33<i class="bi bi-sliders"></i></div>

  <div id="hintText">
    <span>Silence the World, awaken the Soul!</span>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="js/firebase/firebase-init.js"></script>
<script src="js/counter.js"></script>

<script>
  function goToSettings() {
    window.location.href = "settings.html";
  }
</script>
<script src="js/theme.js"></script>
</body>
</html>
