<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prayer Notes</title>

  <!-- Bootstrap Icons ONLY -->
  <link
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet"
  >

  <link rel="stylesheet" href="css/notes.css">
</head>

<body>

<!-- Header -->
<header class="notes-header">
  <h1>
    <i class="bi bi-journal-text"></i>
    Prayer Notes
  </h1>

  <div class="nav">

    <button onclick="goToAllNotes()" title="View All Notes">
      <i class="bi bi-list-ul"></i>
    </button>

    <button id="themeToggle" title="Toggle Light / Dark Mode">
      <i id="themeIcon" class="bi bi-moon-stars"></i>
    </button>

    <button onclick="goToCounter()" title="Back to Counter">
      <i class="bi bi-house-heart-fill"></i>
    </button>


    <button onclick="location.href='inbox.html'">
      <i class="bi bi-chat-dots"></i>
    </button>

    <button onclick="signOut()" title="Sign Out">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>

</header>

<!-- Main -->
<main class="notes-main">

  <!-- Note input -->
  <textarea
          id="noteArea"
          placeholder="Dear, write your prayer note here..."
  ></textarea>
  <div id="charCounter">0 characters</div>

  <!-- Action buttons -->
  <div class="notes-actions">

    <select id="languageSelect" class="theme-select" title="Choose Language">
      <option value="en-US">🇺🇸</option>
      <option value="nl-NL">🇳🇱</option>
      <option value="nl-BE">🇧🇪</option>
    </select>

    <button id="dictationBtn" onclick="toggleDictation()" title="Voice to Text">
      <i id="micIcon" class="bi bi-mic"></i>
    </button>

    <button id="copyBtn" onclick="copyToClipboard()" title="Copy to Clipboard">
      <i id="copyIcon" class="bi bi-clipboard"></i>
    </button>

    <button onclick="saveNote()" title="Save Note">
      <i class="bi bi-save"></i>
    </button>

  </div>

  <!-- Status Message -->
  <div id="saveStatus"></div>

</main>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Firebase init -->
<script src="js/firebase/firebase-init.js"></script>

<!-- App scripts -->
<script src="js/notes/notes.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
