<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap Icons -->
  <link
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet"
  >

  <!-- Inbox Styles -->
  <link rel="stylesheet" href="css/inbox.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="inbox-header">
  <div class="header-left">
    <i class="bi bi-chat-dots"></i>
    <span>Inbox</span>
  </div>

  <div class="header-actions">
    <!-- Back to Counter -->
    <button onclick="goToCounter()" title="Back">
      <i class="bi bi-house-heart-fill"></i>
    </button>

    <!-- Theme toggle (USED BY theme.js) -->
    <button id="themeToggle" title="Toggle Light / Dark Mode">
      <i id="themeIcon" class="bi bi-moon-stars"></i>
    </button>

    <button onclick="goToNotes()" title="Prayer Notes">
      <i class="bi bi-journal-text"></i>
    </button>

    <button onclick="goToAllNotes()" title="View All Notes">
      <i class="bi bi-list-ul"></i>
    </button>

  </div>
</header>

<main class="inbox-main">

  <div class="search-container">
    <i class="bi bi-search search-icon"></i>
    <input
            id="userSearch"
            type="text"
            placeholder="Search chats or users…"
            class="search-input"
    />
  </div>

  <ul id="chatList" class="chat-list">
  </ul>

</main>

<button class="fab-btn" title="New Chat">
  <i class="bi bi-plus-lg"></i>
</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="js/firebase/firebase-init.js"></script>
<script src="js/chats/inbox.js"></script>

<!-- Theme (shared across ALL pages) -->
<script src="js/theme.js"></script>


<!-- ===== NAV + THEME ===== -->
<script>
function goToCounter() {
window.location.href = "index.html";
}

function goToNotes() {
  window.location.href = "notes.html";
}

function goToAllNotes() {
  window.location.href = "all-notes.html";
}
</script>

</body>
</html>
